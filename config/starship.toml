# Starship prompt — Powerlevel10k 스타일

format = """
[](fg:blue)\
$os\
$directory\
[](fg:blue bg:green)\
$git_branch\
$git_status\
[](fg:green bg:yellow)\
$nodejs\
$python\
$rust\
$golang\
$deno\
[](fg:yellow bg:purple)\
$docker_context\
[](fg:purple bg:red)\
$cmd_duration\
[](fg:red)\
$fill\
$time\
$line_break\
$character"""

[os]
format = "[ ](bg:blue fg:white)"
disabled = false

[os.symbols]
Macos = ""
Linux = ""
Windows = "󰍲 "

[directory]
format = "[ $path ]($style)"
style = "bg:blue fg:white bold"
truncation_length = 3
truncate_to_repo = true
read_only = " 󰌾"

[directory.substitutions]
"Documents" = "󰈙"
"Downloads" = ""
"dotfiles" = ""
"dev" = ""

[git_branch]
format = "[ $symbol$branch ]($style)"
style = "bg:green fg:black"
symbol = " "

[git_status]
format = "[$all_status$ahead_behind]($style)"
style = "bg:green fg:black"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "✘"
staged = "✚"
untracked = "?"
stashed = "≡"

[nodejs]
format = "[ $symbol$version ]($style)"
style = "bg:yellow fg:black"
symbol = " "

[python]
format = "[ $symbol$version ]($style)"
style = "bg:yellow fg:black"
symbol = " "

[rust]
format = "[ $symbol$version ]($style)"
style = "bg:yellow fg:black"
symbol = " "

[golang]
format = "[ $symbol$version ]($style)"
style = "bg:yellow fg:black"
symbol = " "

[deno]
format = "[ $symbol$version ]($style)"
style = "bg:yellow fg:black"
symbol = " "

[docker_context]
format = "[ $symbol$context ]($style)"
style = "bg:purple fg:white"
symbol = " "

[cmd_duration]
min_time = 2_000
format = "[ 󰔟 $duration ]($style)"
style = "bg:red fg:white"

[fill]
symbol = " "

[time]
disabled = false
format = "[ $time ](fg:bright-black)"
time_format = "%H:%M"

[line_break]
disabled = false

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

